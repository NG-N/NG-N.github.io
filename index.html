<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Promotion Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        .banner-box {
            margin: 20px 0;
            min-height: 150px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome</h1>
        
        <!-- Banner Container (Cleaned: Fallback Removed) -->
        <div class="banner-box">
            <img id="banner-placeholder" src="data/banner.jpg" alt="Promotional Banner">
        </div>

        <!-- Promo Link Button -->
        <p>
            <a id="promo-link-placeholder" href="https://github.com" class="btn">Visit Promotion Link</a>
        </p>
    </div>

    <script>
        console.log("System initialized. Running stable data loader...");

        const bannerImg = document.getElementById('banner-placeholder');
        const promoLink = document.getElementById('promo-link-placeholder');

        // Safely handle banner load tracking once without secondary triggers
        if (bannerImg) {
            if (bannerImg.complete) {
                console.log("Banner loaded instantly from cache.");
            } else {
                bannerImg.addEventListener('load', function() {
                    console.log("Banner image loaded successfully.");
                }, { once: true });
            }
        }

        // Fetch promotion configuration layout from JSON file
        fetch('data/promo.json')
            .then(response => {
                if (!response.ok) throw new Error('Data file promo.json not found');
                return response.json();
            })
            .then(data => {
                if (data && data.url && promoLink) {
                    promoLink.href = data.url;
                    console.log("Promotional link configured to: " + data.url);
                }
            })
            .catch(err => {
                console.warn("Using default fallback link. Profile status: " + err.message);
            });
    </script>

</body>
</html>
