<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Offers & Content</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 480px;
            width: 90%;
        }
        h1 {
            color: #1a1a1a;
            font-size: 26px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666666;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 35px;
        }
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .monetized-btn {
            display: block;
            background-color: #0070f3;
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(0, 112, 243, 0.2);
            transition: background 0.2s ease, transform 0.1s ease;
        }
        .monetized-btn:hover {
            background-color: #0060df;
        }
        .monetized-btn:active {
            transform: scale(0.99);
        }
        /* Style for a secondary or alternative offer button */
        .btn-secondary {
            background-color: #10b981;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2);
        }
        .btn-secondary:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Available Content</h1>
        <p class="subtitle">Select an option below to access your destination immediately.</p>
        
        <div class="links-wrapper">
            <!-- LINK 1 -->
            <a href="https://FIRST-MONETIZED-LINK.com" class="monetized-btn" target="_blank" rel="noopener noreferrer">
                👉 Access Primary Content
            </a>

            <!-- LINK 2 -->
            <a href="https://SECOND-MONETIZED-LINK.com" class="monetized-btn btn-secondary" target="_blank" rel="noopener noreferrer">
                🔥 View Special Offer
            </a>

            <!-- LINK 3 -->
            <a href="https://THIRD-MONETIZED-LINK.com" class="monetized-btn" target="_blank" rel="noopener noreferrer">
                ⚡ Premium Download
            </a>
        </div>
    </div>

</body>
</html>
