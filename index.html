<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            margin: 0;
            padding: 30px 15px;
            color: #333333;
        }
        .hub-container {
            background: white;

        .frame-box {

            height: 650px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            margin-top: 15px;
            background: #ffffff;

    <div class="hub-container">
        <h1 style="margin-top:0; color:#1e293b;">Promotion Engine</h1>
        <p style="color:#64748b; margin:0;">Browse or select from our verified live global inventory below</p>
        
        <!-- Secure seamless spreadsheet display portal -->
        <iframe class="frame-box" src="https://google.com"></iframe>
    </div>

</body>
</html>
