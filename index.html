<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Promotion Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 50px 20px;
            color: #333333;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: inline-block;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }
        .banner-box {
            margin: 20px 0;
            min-height: 100px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .btn {
            display: block;
            padding: 15px 20px;
            background-color: #ff4757;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome</h1>
        
        <!-- Banner Container -->
        <div class="banner-box">
            <img src="data/banner.jpg" alt="Promotional Banner">
        </div>

        <!-- 3 Hardcoded Buttons -->
        <div class="links-container">
            <a href="https://github.com" target="_blank" class="btn">👉 CLAIM YOUR OFFER HERE</a>
            <a href="https://pages.github.com" target="_blank" class="btn">🔥 GET 50% SPECIAL DISCOUNT</a>
            <a href="https://github.com" target="_blank" class="btn">💬 JOIN OUR EXCLUSIVE CHAT</a>
        </div>
    </div>

</body>
</html>
