<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Offer Hub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 30px 15px;
            color: #333333;
        }
        .hub-container {
            background: white;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            box-sizing: border-box;
            text-align: center;
        }
        .search-box {
            width: 100%;
            padding: 12px 15px;
            margin: 15px 0 25px 0;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }
        .search-box:focus {
            border-color: #ff4757;
        }
        .grid-storage {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }
        /* Custom scrollbar for clean layout */
        .grid-storage::-webkit-scrollbar {
            width: 6px;
        }
        .grid-storage::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .offer-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 14px 20px;
            border-radius: 10px;
            border-left: 5px solid #ff4757;
            text-decoration: none;
            color: #334155;
            font-weight: bold;
            transition: transform 0.1s ease, background 0.2s ease;
        }
        .offer-card:hover {
            background: #f1f5f9;
            transform: scale(1.01);
        }
        .go-btn {
            background: #ff4757;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <h1 style="margin-top:0; color:#1e293b;">Promotion Engine</h1>
        <p style="color:#64748b; margin:0;">Search or select from our verified global inventory</p>
        
        <!-- Live Filter Input Box -->
        <input type="text" id="searchBar" class="search-box" placeholder="🔍 Search offers...">

        <!-- Big Storage Vault Wrapper -->
        <div id="storageVault" class="grid-storage"></div>
    </div>

    <script>
        // VAULT DATA MATRIX - Dump your 99 links here safely without breaking layouts
        const offerDatabase = [
            { name: "👉 CPM Traffic Link 1", url: "https://effectivecpmnetwork.com" },
            { name: "🔥 Premium Promo Offer 2", url: "https://github.com" },
            { name: "💬 Joint Community Chat 3", url: "https://github.com" }
            // Paste your next 96 links directly below this line following the exact same format
        ];

        const storageVault = document.getElementById('storageVault');
        const searchBar = document.getElementById('searchBar');

        // Render Database Items Instantly
        function displayInventory(items) {
            storageVault.innerHTML = '';
            if(items.length === 0) {
                storageVault.innerHTML = '<p style="color:#94a3b8; padding:20px;">No matching campaigns found.</p>';
                return;
            }
            items.forEach(item => {
                const card = document.createElement('a');
                card.href = item.url;
                card.target = '_blank';
                card.className = 'offer-card';
                card.innerHTML = `<span>${item.name}</span><span class="go-btn">Go</span>`;
                storageVault.appendChild(card);
            });
        }

        // Live Real-Time Search Filtering Logic
        searchBar.addEventListener('input', (e) => {
            const searchString = e.target.value.toLowerCase();
            const filteredItems = offerDatabase.filter(item => 
                item.name.toLowerCase().includes(searchString)
            );
            displayInventory(filteredItems);
        });

        // Initialize display execution
        displayInventory(offerDatabase);
    </script>

</body>
</html>
